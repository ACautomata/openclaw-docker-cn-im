name: CI Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查 init.sh bash 语法
        run: bash -n init.sh

      - name: 检查 init.sh 换行符 (必须 LF)
        run: |
          if file init.sh | grep -qi CRLF; then
            echo "::error::init.sh 包含 CRLF 换行符，必须使用 LF"
            exit 1
          fi

      - name: 校验 version.txt 格式
        run: |
          v=$(tr -d '[:space:]' < version.txt)
          if [[ ! "$v" =~ ^[0-9]{4}\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version.txt 格式应为 YYYY.M.N，当前值: $v"
            exit 1
          fi

      - name: 校验 docker-compose.yml 语法
        run: docker compose config --quiet 2>&1

  python-config-tests:
    name: Python Config Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 pytest
        run: pip install pytest

      - name: 提取 init.sh 中的 Python 配置生成代码
        run: python3 tests/extract_python.py

      - name: 运行配置生成测试
        run: pytest tests/test_config_gen.py -v --tb=short

  dockerfile-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Docker 镜像 (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: openclaw-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CLAWHUB_TOKEN=${{ secrets.CLAWHUB_TOKEN }}

      - name: 保存镜像供后续测试
        run: docker save openclaw-test:ci | gzip > /tmp/openclaw-image.tar.gz

      - name: 上传镜像 artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/openclaw-image.tar.gz
          retention-days: 1

  container-startup:
    name: Container Startup Test
    runs-on: ubuntu-latest
    needs: dockerfile-build
    steps:
      - uses: actions/checkout@v4

      - name: 下载镜像 artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: 加载 Docker 镜像
        run: docker load < /tmp/openclaw-image.tar.gz

      - name: 创建测试数据目录
        run: mkdir -p /tmp/openclaw-data

      - name: 启动容器
        run: |
          docker run -d \
            --name openclaw-ci \
            -p 18789:18789 \
            -v /tmp/openclaw-data:/home/node/.openclaw \
            -e MODEL_ID=gpt-4o \
            -e BASE_URL=https://api.example.com/v1 \
            -e API_KEY=test-key \
            -e API_PROTOCOL=openai-completions \
            -e OPENCLAW_GATEWAY_TOKEN=test-ci-token \
            -e OPENCLAW_GATEWAY_PORT=18789 \
            -e OPENCLAW_GATEWAY_BIND=0.0.0.0 \
            -e SYNC_OPENCLAW_CONFIG=true \
            -e AGENT_REACH_ENABLED=false \
            openclaw-test:ci

      - name: 等待 Gateway 启动
        run: |
          echo "等待 Gateway 启动..."
          for i in $(seq 1 60); do
            if docker logs openclaw-ci 2>&1 | grep -q "Gateway"; then
              echo "Gateway 启动成功"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "超时: Gateway 未在 120 秒内启动"
              docker logs openclaw-ci 2>&1 || true
              exit 1
            fi
            sleep 2
          done

      - name: 验证端口 18789 响应
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:18789/ 2>/dev/null; then
              echo "端口 18789 已响应"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "超时: 端口 18789 未响应"
              docker logs openclaw-ci 2>&1 || true
              exit 1
            fi
            sleep 2
          done

      - name: 验证 openclaw.json 生成
        run: |
          if [ ! -f /tmp/openclaw-data/openclaw.json ]; then
            echo "openclaw.json 未生成"
            docker logs openclaw-ci 2>&1 || true
            exit 1
          fi
          python3 -c "
          import json
          cfg = json.load(open('/tmp/openclaw-data/openclaw.json'))
          assert cfg['models']['providers']['default']['apiKey'] == 'test-key', 'API key 不匹配'
          assert cfg['gateway']['auth']['token'] == 'test-ci-token', 'Gateway token 不匹配'
          assert cfg['gateway']['port'] == 18789, '端口不匹配'
          print('配置验证通过')
          "

      - name: 输出容器日志 (失败时)
        if: failure()
        run: |
          echo "=== 容器日志 ==="
          docker logs openclaw-ci 2>&1 || true
          echo "=== 容器状态 ==="
          docker inspect openclaw-ci --format='{{.State.Status}} {{.State.ExitCode}}' 2>/dev/null || true

      - name: 清理容器
        if: always()
        run: docker rm -f openclaw-ci 2>/dev/null || true
